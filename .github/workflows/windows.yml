name: Windows Build
on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-2022
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']
        ts: [nts]

    name: PHP ${{ matrix.php }} ${{ matrix.ts }} x64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build php_simdjson
        uses: php/php-windows-builder/extension@v1
        with:
          arch: x64
          php-version: ${{ matrix.php }}
          ts: ${{ matrix.ts }}
          run-tests: false
          # Backstop: php-windows-builder only forwards --enable-* flags when
          # composer.json's `php-ext.configure-options` lists them. We also
          # list it there, but pass it through `args` as well in case the
          # metadata isn't picked up.
          args: --enable-simdjson=shared
          # The builder embeds the ref in the artifact filename without
          # sanitizing it. A branch like "fix/foo" turns "/" into a path
          # separator on Windows and the build fails. Pass the commit SHA so
          # the name is always slash-free.
          extension-ref: ${{ github.sha }}